services:
  nginx:
    image: nginx:1.27-alpine
    container_name: rbmschedule-nginx
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html/rbmschedule
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - rbmschedule-network
    restart: unless-stopped

  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: rbmschedule-app
    depends_on:
      - mysql
    environment:
      APP_ENV: ${APP_ENV:-production}
      DEBUG_MODE: ${DEBUG_MODE:-false}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-rbm_schedule}
      DB_USER: ${DB_USER:-rbm_user}
      DB_PASS: ${DB_PASS:-rbm_password}
    volumes:
      - ./:/var/www/html/rbmschedule
    networks:
      - rbmschedule-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: rbmschedule-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-rbm_schedule}
      MYSQL_USER: ${DB_USER:-rbm_user}
      MYSQL_PASSWORD: ${DB_PASS:-rbm_password}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - rbmschedule-network
    restart: unless-stopped

networks:
  rbmschedule-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: br-rbmschedule
    ipam:
      config:
        - subnet: 172.25.0.0/16

volumes:
  mysql_data:
